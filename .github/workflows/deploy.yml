name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit SHA to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/nextjs

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1. Checkout selected ref
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      # 2. Generate deterministic SHA tag
      - name: Generate Image Tag
        run: |
          TAG=$(git rev-parse HEAD)

          echo "TAG=$TAG" >> $GITHUB_ENV

          echo "Using image tag: $TAG"

      # 3. Login to GHCR
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # 4. Build & Push Docker image
      - name: Build & Push
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }} \
            -t $IMAGE:${{ env.TAG }} .

          docker tag $IMAGE:${{ env.TAG }} $IMAGE:latest

          docker push $IMAGE:${{ env.TAG }}
          docker push $IMAGE:latest

      # 5. Verify pushed image exists
      - name: Verify Image Exists
        run: |
          docker pull $IMAGE:${{ env.TAG }}

      # 6. Deploy to server
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            IMAGE=${{ env.IMAGE }}
            TAG=${{ env.TAG }}

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            cd /home/my-portfolio

            echo "Deploying image: $IMAGE:$TAG"

            # Pull exact image version
            docker pull $IMAGE:$TAG

            # Inject tag into compose
            echo "IMAGE_TAG=$TAG" > .env

            # Deploy updated container
            docker compose up -d

            # Show running containers
            docker compose ps

            # Show latest logs
            # docker compose logs --tail=50

            # Cleanup dangling images
            docker image prune -f