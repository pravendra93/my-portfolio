name: Manual Deploy

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch or commit SHA to deploy"
        required: true
        default: "main"

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository }}/nextjs

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # 1. Checkout specific ref (CRITICAL)
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      # 2. Login to GHCR (use PAT, not GITHUB_TOKEN for consistency)
      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME }}
          password: ${{ secrets.GHCR_PAT }}

      # 3. Build with SHA tag (NO more latest-only)
      - name: Build & Push
        run: |
          TAG=$(git rev-parse HEAD)

          docker build \
            --build-arg NEXT_PUBLIC_GTM_ID=${{ secrets.NEXT_PUBLIC_GTM_ID }} \
            -t $IMAGE:$TAG .
          docker tag $IMAGE:$TAG $IMAGE:latest

          docker push $IMAGE:$TAG
          docker push $IMAGE:latest

      # 4. Deploy exact version
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e

            IMAGE=${{ env.IMAGE }}
            TAG=${{ github.event.inputs.ref }}

            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ secrets.GHCR_USERNAME }} --password-stdin

            cd /home/my-portfolio

            # pull exact version
            docker pull $IMAGE:$TAG

            echo "IMAGE_TAG=$TAG" > .env

            docker compose up -d

            docker compose ps