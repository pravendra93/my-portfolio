name: CI/CD Deploy

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Login to GHCR
      - name: Login to GHCR
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # 3. Build image
      - name: Build Docker Image
        run: |
          docker build -t ghcr.io/${{ github.repository }}/nextjs:latest .

      # 4. Push image
      - name: Push Docker Image
        run: |
          docker push ghcr.io/${{ github.repository }}/nextjs:latest

      # 5. Deploy to DO via SSH
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_PAT }}
            docker pull ghcr.io/${{ github.repository }}/nextjs:latest

            cd /home/my-portfolio

            docker compose down
            docker compose up -d